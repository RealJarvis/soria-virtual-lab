<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soria – Login</title>

  <link rel="stylesheet" href="login.css">
  <link rel="icon" href="../media/icon/sor.png" type="image/x-icon"/>
</head>

<body>

<!-- Back Button -->
<a href="../soriamain.html" class="back-btn">← Späť</a>

<!-- Login Card -->
<div class="login-container">
  <div class="login-card">
    <form class="login-form" >

      <!-- Email Input -->
      <div class="input-wrapper">
        <input type="email" id="email" placeholder="Email" required>
      </div>

      <!-- Password Input -->
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Heslo" required>
      </div>

      <!-- Submit Button -->
      <button class="login-btn" type="submit">Prihlásiť sa</button>

      <!-- Register Text -->
      <p class="register-text">
        Nemáte účet? Môžete sa <a href="../signup/signup.html">zaregistrovať tu</a>
      </p>

    </form>
    <script src="login.js"></script>
  </div>
</div>

</body>
</html>
