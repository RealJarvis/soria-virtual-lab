<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title >Virtual Lab</title>
  <link rel="icon" href="../media/icon/sor.png" type="image/x-icon"/>
  <link rel="stylesheet" href="lab.css">

</head>
<body>
<div id="image-viewer">
  <img id="schematic-image" />
</div>

<div id="toolbar">
  <div id="menubar"><a onclick="goBack()" class="back-btn">← Späť</a></div>

  <div id="buttons">
    <div class="settings-btn"><img src="../media/icon/settings.png"></div>
    <div class="state" id="OFF" onclick="tutorialSwitch()"><img src="../media/icon/tutoroff.png"></div>
    <a href="../profile/profile.html"><img id="toolbar_profile" src="../media/icon/avatar.png" alt=""></a>
  </div>
</div>

<div class="lab-container">
  <!-- Left: Lab area -->
  <div id="lab-area">


    <!--SVG layer for the wires -->
    <svg id="wire-layer"></svg>

  </div>
  <script>
    function goBack() {
      window.history.back();
    }
  </script>




  <!-- Right: Controls -->
  <div class="interface">
    <!--Switch between the code and the settings for the sensors-->
    <div id="interface-buttons">
      <div class="icon-btn active" data-type="settings" onclick="switchMenu(this)"><h1>⚙️</h1></div>
      <div class="icon-btn" data-type="code" onclick="switchMenu(this)"><h1>🧑🏻‍💻</h1></div>
    </div>

    <div id="state-of" class="settings-segment">

    </div>



    <!--This is the custom menu for the right-click-->
    <div id="custom-menu">
      <div class="menu-item">Rotate</div>
      <div class="menu-item" onclick="deleteSensor()">Delete</div>
      <div class="menu-item" onclick="findSensorInfo()">Info</div>
      <div class="menu-item" onclick="startConnection()">Connect</div>

    </div>
    <!--The information panel once the user clicked on the Info button-->
    <div id="information-panel">
      <div class="close-button" onclick="closeInfoPanel()">❌️</div>
      <div class="info-button" onclick="openImage()">Show schematics</div>
      <div class="info-button">Data</div>
      <div class="info-button">About device</div>

    </div>
    <script src="rightclick.js" ></script>

    <!--<label class="settings-segment" id="object-select">Vyberte object:</label>
    <select class="settings-segment" id="object-select-select">
      <option value="Fan" >Fan</option>

    </select>
-->

    <div class="code-segment">
      <textarea class="code-segment" id="code" rows="5" cols="53"></textarea>
      <script src="console.js"></script>
    </div>
    <!--logic for the connection is in lab.js file -->
    <!--adding the sensors script-->
    <script  src="lab.js"></script>
    <script src="simulation.js"></script>

  <div id="usercontrol" class="interface">

    <label class="settings-segment" for="sensor-select">Vyberte senzor:</label>
    <select class="settings-segment" id="sensor-select">
      <option value="pico-2">Pico-2</option>
      <option value="LM35">Analog LM35 Temperature Sensor</option>
      <option value="URM09">URM09 Ultrasonic Distance Sensor</option>
      <option value="I2C">I2C Triple Axis Accelerometer</option>
      <option value="hall">Digital Hall Sensor</option>
      <option value="GP2Y0A41SK0F">Distance Measuring Sensor</option>
      <option value="potentiometer">Analog Slide Position</option>
      <option value="heater">Heating machine</option>
      <option value="magnet">Magnet</option>
    </select>

    <button id="apply-settings" onclick="addSensor()">Pridať komponent</button>
  </div>

  </div>

</div>


<div id="tutorial-overlay">
  <div class="tutorial-box">
  </div>
</div>

</body>
</html>
