<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title >Virtual Lab</title>
  <link rel="icon" href="../media/icon/sor.png" type="image/x-icon"/>
  <link rel="stylesheet" href="lab.css">

</head>
<body>
<div id="image-viewer">
  <img id="schematic-image" />
</div>

<div id="toolbar">
  <div id="menubar"><a onclick="goBack()" class="back-btn">← Späť</a></div>

  <div id="buttons">
    <div class="settings-btn"><img src="../media/icon/settings.png"></div>
    <div class="state" id="OFF" onclick="tutorialSwitch()"><img src="../media/icon/tutoroff.png"></div>
    <a href="../profile/profile.html"><img id="toolbar_profile" src="../media/icon/avatar.png" alt=""></a>
  </div>
</div>

<div class="lab-container">
  <!-- Left: Lab area -->
  <div id="lab-area">


    <!--SVG layer for the wires -->
    <svg id="wire-layer"></svg>

  </div>
  <script>
    function goBack() {
      window.history.back();
    }
  </script>




  <!-- Right: Controls -->
  <div class="interface">
    <!--Switch between the code and the settings for the sensors-->

    <div class="tab-wrapper">
      <div id="interface-buttons" class="tabs">
        <div class="tab active" data-type="settings" onclick="switchMenu(this)">Logy</div>
        <div class="tab" data-type="code" onclick="switchMenu(this)">Konzola</div>
        <div class="tab" data-type="devices" onclick="switchMenu(this)">Zariadenia</div>
        <!-- CONTENT -->
      </div>

      <div id="state-of" class="settings-segment"></div>

      <div class="code-segment">
        <textarea class="code-segment" id="code" rows="5" cols="53"></textarea>
        <script src="console.js"></script>
      </div>

      <div class="devices-segment">

      </div>

      <div id="controller-buttons" class="controller-tabs">
        <div class="controller-tab" data-type="play" onclick="switchMode(this)"><img src="../media/icon/start.png" alt="reset" width="25px" height="25px"> </div>
        <div class="controller-tab active" data-type="stop" onclick="switchMode(this)"><img src="../media/icon/stop.png" alt="reset" width="25px" height="25px"> </div>
      </div>

    </div>


    <!--This is the custom menu for the right-click-->
    <div id="custom-menu">
      <div class="menu-item" onclick="deleteSensor()">Delete</div>
      <div class="menu-item" onclick="openImage()">Show schematics</div>
      <div class="menu-item" onclick="findSensorInfo()">Learn about</div>
    </div>

    <script src="rightclick.js" ></script>
    <script src="pins.js" ></script>

    <!--logic for the connection is in lab.js file -->
    <!--adding the sensors script-->
    <script  src="lab.js"></script>
    <script  src="boardshandler.js"></script>
    <script src="simulation.js"></script>

  <div id="usercontrol" class="interface">


    <div class="tab-wrapper">
      <div id="sensorscroller-buttons" class="tabs">
        <div class="tab active" data-type="everything" onclick="adjustScroll(this)">Všetko</div>
        <div class="tab" data-type="microcontoller" onclick="adjustScroll(this)">Dosky</div>
        <div class="tab" data-type="sensors" onclick="adjustScroll(this)">Senzory</div>
        <div class="tab" data-type="objects" onclick="adjustScroll(this)">Objekty</div>
        <!-- CONTENT -->
      </div>

      <div id="component-scroller">

        <div class="component-card doska active" data-value="uno" onclick="selectComponent(this)">
          <img src="../media/icon/uno.png" alt="Arduino Uno">
          <span>Arduino Uno</span>
        </div>

        <div class="component-card doska" data-value="pico-2" onclick="selectComponent(this)">
          <img src="../media/icon/pico-2.png" alt="Pico-2">
          <span>Pico-2</span>
        </div>

        <div class="component-card snimace" data-value="LM35" onclick="selectComponent(this)">
          <img src="../media/icon/LM35.png" alt="LM35">
          <span>LM35</span>
        </div>

        <div class="component-card snimace" data-value="URM09" onclick="selectComponent(this)">
          <img src="../media/icon/URM09.png" alt="URM09">
          <span>URM09</span>
        </div>

        <div class="component-card snimace" data-value="I2C" onclick="selectComponent(this)">
          <img src="../media/icon/I2C.png" alt="I2C">
          <span>I2C Triple Axis Accelerometer</span>
        </div>

        <div class="component-card snimace" data-value="hall" onclick="selectComponent(this)">
          <img src="../media/icon/hall.png" alt="hall">
          <span>Digital Hall Sensor</span>
        </div>

        <div class="component-card snimace" data-value="GP2Y0A41SK0F" onclick="selectComponent(this)">
          <img src="../media/icon/GP2Y0A41SK0F.png" alt="GP2Y0A41SK0F">
          <span>Distance Measuring Sensor</span>
        </div>

        <div class="component-card snimace" data-value="potentiometer" onclick="selectComponent(this)">
          <img src="../media/icon/potentiometer.png" alt="potentiometer">
          <span>Analog Slide Position</span>
        </div>

        <div class="component-card objekty" data-value="heater" onclick="selectComponent(this)">
          <img src="../media/icon/heater.png" alt="heater">
          <span>Heater</span>
        </div>

        <div class="component-card objekty" data-value="magnet" onclick="selectComponent(this)">
          <img src="../media/icon/magnet.png" alt="magnet">
          <span>Magnet</span>
        </div>

        <div class="component-card objekty" data-value="powersupply" onclick="selectComponent(this)">
          <img src="../media/icon/powersupply.png" alt="powersupply">
          <span>Power bank</span>
        </div>

      </div>
    </div>
    <input type="hidden" id="sensor-select" value="uno">


    <div id="lab-control">
      <button id="apply-settings" onclick="addSensor()">Pridať komponent</button>
      <div>
        <img src="../media/icon/save.png" alt="reset" width="35px" height="35px" onclick="safeCurrentVersion()"/>
        <img src="../media/icon/reset.png" alt="reset" width="35px" height="35px" onclick="resetSettings()"/>
      </div>
    </div>

  </div>

  </div>

</div>


<div id="tutorial-overlay">
  <div class="tutorial-box">
  </div>
</div>

</body>
</html>
