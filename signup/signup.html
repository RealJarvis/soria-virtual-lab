<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soria – Login</title>

  <link rel="stylesheet" href="../login/login.css">
  <link rel="icon" href="../media/icon/sor.png" type="image/x-icon"/>
</head>

<body>

<!-- Back Button -->
<a href="../soriamain.html" class="back-btn">← Späť</a>

<!-- Login Card -->
<div class="login-container">
  <div class="login-card">
    <form class="login-form">
      <!-- User Input -->
      <div class="input-wrapper">

        <input id="username" placeholder="Používateľské meno" required>
      </div>

      <!-- Email Input -->
      <div class="input-wrapper">
        <input id="email" type="email" placeholder="Email" required>
      </div>

      <!-- Role Input -->
      <div class="input-wrapper">
        <input id="role" placeholder="(Študent alebo učiteľ)" required>
      </div>


      <!-- Password Input -->
      <div class="input-wrapper">
        <input id="password" type="password" placeholder="Heslo" required>
      </div>

      <!-- Submit Button -->
      <button class="login-btn" id="signup-btn" type="submit">Registrovať sa</button>
      <p id="signup-message"></p>
    </form>
    <script src="signup.js"></script>
  </div>
</div>

</body>
</html>
